<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimatum Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Times New Roman, Times, serif;
  background: #f0ede8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  width: 100%;
  max-width: 640px;
  background: #fff;
  border: 1px solid #ddd8d0;
  border-radius: 6px;
  padding: 28px 32px 24px;
}
.offer-label {
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #999;
  text-align: center;
  margin-bottom: 24px;
}
.main-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
}
.player {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  flex: 0 0 140px;
}
.player-label {
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #aaa;
}
.photo-box {
  width: 140px;
  height: 175px;
  border: 1px solid #ddd;
  border-radius: 4px;
  overflow: hidden;
  background: #e8e4de;
}
.photo-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
.photo-box.silhouette {
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-box.silhouette svg { width: 64px; opacity: .25; }
.amounts {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.amounts-row {
  display: flex;
  align-items: center;
}
.amt-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 0 20px;
}
.amt-who {
  font-size: 9px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #bbb;
}
.amt-val {
  font-size: 28px;
  font-weight: 500;
  color: #111;
}
.amt-sep { width: 1px; height: 36px; background: #e0dbd4; }
.pool-note { font-size: 9px; color: #ccc; letter-spacing: .08em; }
.divider { border: none; border-top: 1px solid #eae6e0; margin-bottom: 20px; }
.actions {
  display: flex;
  justify-content: center;
  gap: 40px;
}
.btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  transition: transform .15s;
}
.btn:hover { transform: translateY(-2px); }
.btn-lbl {
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #aaa;
}
.btn-circle {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid #bbb;
  background: #fff;
  transition: all .2s;
}
.btn:hover .btn-circle         { border-color: #555; }
.btn.sel-accept .btn-circle    { border-color: #333; background: #333; }
.btn.sel-reject .btn-circle    { border-color: #333; background: #333; }
.feedback {
  text-align: center;
  margin-top: 14px;
  font-size: 10px;
  color: #aaa;
  letter-spacing: .08em;
  min-height: 14px;
  opacity: 0;
  transition: opacity .3s;
}
.feedback.show { opacity: 1; }
</style>
</head>
<body>
<div class="card">
  <p class="offer-label">Offer</p>
  <div class="main-row">

    <div class="player">
      <span class="player-label">Proposer</span>
      <div class="photo-box">
        <img id="proposer-photo" src="" alt="Proposer">
      </div>
    </div>

    <div class="amounts">
      <div class="amounts-row">
        <div class="amt-block">
          <span class="amt-who">Proposer</span>
          <span class="amt-val" id="amt-p">$0.70</span>
        </div>
        <div class="amt-sep"></div>
        <div class="amt-block">
          <span class="amt-who">You</span>
          <span class="amt-val" id="amt-y">$0.30</span>
        </div>
      </div>
      <span class="pool-note">Total pool: $1.00</span>
    </div>

    <div class="player">
      <span class="player-label">You</span>
      <div class="photo-box silhouette">
        <svg viewBox="0 0 60 80" fill="none">
          <circle cx="30" cy="22" r="16" fill="#1a1814"/>
          <path d="M4 72c0-14.36 11.64-26 26-26s26 11.64 26 26" fill="#1a1814"/>
        </svg>
      </div>
    </div>

  </div>

  <hr class="divider">

  <div class="actions">
    <button class="btn accept" id="btn-a" onclick="choose('accept')">
      <div class="btn-circle"></div>
      <span class="btn-lbl">Accept</span>
    </button>
    <button class="btn reject" id="btn-r" onclick="choose('reject')">
      <div class="btn-circle"></div>
      <span class="btn-lbl">Reject</span>
    </button>
  </div>

  <div class="feedback" id="fb"></div>
</div>

// Ofertas: [proposer_keeps, you_receive]
// 5 niveles x 3 repeticiones = 15 rondas por bloque de género
const offers = [
  [0.70,0.30],[0.50,0.50],[0.80,0.20],[0.60,0.40],[0.90,0.10],
  [0.50,0.50],[0.70,0.30],[0.80,0.20],[0.60,0.40],[0.90,0.10],
  [0.70,0.30],[0.50,0.50],[0.60,0.40],[0.80,0.20],[0.90,0.10],
  [0.70,0.30],[0.50,0.50],[0.80,0.20],[0.60,0.40],[0.90,0.10],
  [0.50,0.50],[0.70,0.30],[0.80,0.20],[0.60,0.40],[0.90,0.10],
  [0.70,0.30],[0.50,0.50],[0.60,0.40],[0.80,0.20],[0.90,0.10]
];

let round = 0;
let lastPhotoIdx = -1;

function randomPhoto() {
  let idx;
  do { idx = Math.floor(Math.random() * photos.length); }
  while (idx === lastPhotoIdx && photos.length > 1);
  lastPhotoIdx = idx;
  return photos[idx];
}

function update() {
  document.getElementById("proposer-photo").src = randomPhoto();
  document.getElementById("amt-p").textContent = "$" + offers[round][0].toFixed(2);
  document.getElementById("amt-y").textContent = "$" + offers[round][1].toFixed(2);
  document.getElementById("btn-a").className = "btn accept";
  document.getElementById("btn-r").className = "btn reject";
  const fb = document.getElementById("fb");
  fb.className = "feedback";
  fb.textContent = "";
}

function choose(d) {
  document.getElementById("btn-a").className = "btn accept" + (d==="accept" ? " sel-accept" : "");
  document.getElementById("btn-r").className = "btn reject" + (d==="reject" ? " sel-reject" : "");
  const fb = document.getElementById("fb");
  fb.textContent = "Response recorded.";
  fb.className = "feedback show";
  setTimeout(() => {
    if (round < offers.length - 1) { round++; update(); }
    else { fb.textContent = "Task complete. Thank you."; }
  }, 700);
}

update();
</script>
